<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 650"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
     role="img" aria-labelledby="diagramTitle diagramDesc">
  <title id="diagramTitle">Monolith vs Microservices Comparison</title>
  <desc id="diagramDesc">Side-by-side comparison of monolithic and microservices architectures across deployment, scaling, complexity, and team independence dimensions.</desc>
  <defs>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#64748B"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="leftPanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="rightPanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#172B4D" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#172B4D" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1400" height="650" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="700" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#1E293B">Monolith vs Microservices</text>

  <!-- Left panel: Monolith -->
  <rect x="40" y="70" width="630" height="540" rx="14" fill="url(#leftPanel)" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <g filter="url(#shadowSm)">
    <rect x="40" y="70" width="630" height="50" rx="14" fill="url(#slateGrad)"/>
    <rect x="40" y="96" width="630" height="24" fill="url(#slateGrad)"/>
  </g>
  <text x="355" y="101" text-anchor="middle" font-size="18" font-weight="700" fill="white">Monolith</text>

  <!-- Right panel: Microservices -->
  <rect x="730" y="70" width="630" height="540" rx="14" fill="url(#rightPanel)" stroke="#BFDBFE" stroke-width="1.5" filter="url(#shadow)"/>
  <g filter="url(#shadowSm)">
    <rect x="730" y="70" width="630" height="50" rx="14" fill="url(#blueGrad)"/>
    <rect x="730" y="96" width="630" height="24" fill="url(#blueGrad)"/>
  </g>
  <text x="1045" y="101" text-anchor="middle" font-size="18" font-weight="700" fill="white">Microservices</text>

  <!-- Central divider -->
  <line x1="700" y1="130" x2="700" y2="600" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="700" cy="130" r="16" fill="white" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="700" y="135" text-anchor="middle" font-size="11" font-weight="700" fill="#64748B">VS</text>

  <!-- Row 1: Deployment -->
  <text x="355" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#475569" letter-spacing="1">DEPLOYMENT</text>
  <text x="1045" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8" letter-spacing="1">DEPLOYMENT</text>

  <!-- Monolith deployment visual -->
  <rect x="155" y="175" width="400" height="55" rx="8" fill="#475569" filter="url(#shadowSm)"/>
  <text x="355" y="207" text-anchor="middle" font-size="14" font-weight="600" fill="white">Single deployable unit</text>

  <text x="355" y="255" text-anchor="middle" font-size="12" fill="#64748B">Deploy everything at once.</text>
  <text x="355" y="272" text-anchor="middle" font-size="12" fill="#64748B">One failure blocks all changes.</text>

  <!-- Microservices deployment visual -->
  <rect x="775" y="175" width="120" height="55" rx="8" fill="#1D4ED8" filter="url(#shadowSm)"/>
  <text x="835" y="207" text-anchor="middle" font-size="12" font-weight="600" fill="white">Auth</text>
  <rect x="910" y="175" width="120" height="55" rx="8" fill="#2563EB" filter="url(#shadowSm)"/>
  <text x="970" y="207" text-anchor="middle" font-size="12" font-weight="600" fill="white">Users</text>
  <rect x="1045" y="175" width="120" height="55" rx="8" fill="#3B82F6" filter="url(#shadowSm)"/>
  <text x="1105" y="207" text-anchor="middle" font-size="12" font-weight="600" fill="white">Orders</text>
  <rect x="1180" y="175" width="120" height="55" rx="8" fill="#60A5FA" filter="url(#shadowSm)"/>
  <text x="1240" y="207" text-anchor="middle" font-size="12" font-weight="600" fill="white">Payments</text>

  <text x="1045" y="255" text-anchor="middle" font-size="12" fill="#1D4ED8">Deploy services independently.</text>
  <text x="1045" y="272" text-anchor="middle" font-size="12" fill="#1D4ED8">Ship faster, isolate failures.</text>

  <!-- Row 2: Scaling -->
  <line x1="80" y1="295" x2="630" y2="295" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="770" y1="295" x2="1320" y2="295" stroke="#BFDBFE" stroke-width="1"/>

  <text x="355" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#475569" letter-spacing="1">SCALING</text>
  <text x="1045" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8" letter-spacing="1">SCALING</text>

  <!-- Monolith scaling: copies of the whole thing -->
  <rect x="195" y="340" width="80" height="40" rx="6" fill="#475569" fill-opacity="0.3" stroke="#475569" stroke-width="1"/>
  <rect x="285" y="340" width="80" height="40" rx="6" fill="#475569" fill-opacity="0.3" stroke="#475569" stroke-width="1"/>
  <rect x="375" y="340" width="80" height="40" rx="6" fill="#475569" fill-opacity="0.6" stroke="#475569" stroke-width="1.5"/>
  <text x="235" y="365" text-anchor="middle" font-size="10" fill="#475569">Copy</text>
  <text x="325" y="365" text-anchor="middle" font-size="10" fill="#475569">Copy</text>
  <text x="415" y="365" text-anchor="middle" font-size="10" fill="white">Copy</text>

  <text x="355" y="405" text-anchor="middle" font-size="12" fill="#64748B">Scale entire app. Wasteful for</text>
  <text x="355" y="422" text-anchor="middle" font-size="12" fill="#64748B">one hot service.</text>

  <!-- Microservices scaling: independent -->
  <rect x="800" y="340" width="60" height="30" rx="4" fill="#1D4ED8" fill-opacity="0.4"/>
  <rect x="870" y="340" width="60" height="30" rx="4" fill="#2563EB" fill-opacity="0.4"/>
  <rect x="940" y="335" width="60" height="40" rx="4" fill="#3B82F6"/>
  <rect x="1010" y="335" width="60" height="40" rx="4" fill="#3B82F6"/>
  <rect x="1080" y="335" width="60" height="40" rx="4" fill="#3B82F6"/>
  <rect x="1150" y="340" width="60" height="30" rx="4" fill="#60A5FA" fill-opacity="0.4"/>
  <text x="830" y="360" text-anchor="middle" font-size="9" fill="white">1x</text>
  <text x="900" y="360" text-anchor="middle" font-size="9" fill="white">1x</text>
  <text x="1040" y="360" text-anchor="middle" font-size="9" fill="white">3x Orders</text>
  <text x="1180" y="360" text-anchor="middle" font-size="9" fill="white">1x</text>

  <text x="1045" y="405" text-anchor="middle" font-size="12" fill="#1D4ED8">Scale only what needs it.</text>
  <text x="1045" y="422" text-anchor="middle" font-size="12" fill="#1D4ED8">Cost-efficient under load.</text>

  <!-- Row 3: Complexity -->
  <line x1="80" y1="445" x2="630" y2="445" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="770" y1="445" x2="1320" y2="445" stroke="#BFDBFE" stroke-width="1"/>

  <text x="355" y="470" text-anchor="middle" font-size="13" font-weight="700" fill="#475569" letter-spacing="1">COMPLEXITY</text>
  <text x="1045" y="470" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8" letter-spacing="1">COMPLEXITY</text>

  <!-- Rating bars -->
  <rect x="195" y="490" width="320" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="195" y="490" width="100" height="10" rx="5" fill="#16A34A"/>
  <text x="355" y="520" text-anchor="middle" font-size="12" fill="#64748B">Low initial complexity.</text>
  <text x="355" y="537" text-anchor="middle" font-size="12" fill="#64748B">Grows into a "big ball of mud" over time.</text>

  <rect x="885" y="490" width="320" height="10" rx="5" fill="#BFDBFE"/>
  <rect x="885" y="490" width="250" height="10" rx="5" fill="#DC2626"/>
  <text x="1045" y="520" text-anchor="middle" font-size="12" fill="#1D4ED8">High upfront complexity (networking,</text>
  <text x="1045" y="537" text-anchor="middle" font-size="12" fill="#1D4ED8">observability, service mesh).</text>

  <!-- Row 4: Team Independence -->
  <line x1="80" y1="555" x2="630" y2="555" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="770" y1="555" x2="1320" y2="555" stroke="#BFDBFE" stroke-width="1"/>

  <text x="355" y="580" text-anchor="middle" font-size="13" font-weight="700" fill="#475569" letter-spacing="1">TEAM INDEPENDENCE</text>
  <text x="1045" y="580" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8" letter-spacing="1">TEAM INDEPENDENCE</text>

  <rect x="195" y="595" width="320" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="195" y="595" width="80" height="10" rx="5" fill="#D97706"/>

  <rect x="885" y="595" width="320" height="10" rx="5" fill="#BFDBFE"/>
  <rect x="885" y="595" width="290" height="10" rx="5" fill="#16A34A"/>
</svg>
